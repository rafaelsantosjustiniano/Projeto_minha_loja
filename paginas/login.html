<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RP LOCAÇÕES</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>
<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">
            <a href="../index.html">RP LOCAÇÕES</a>
        </div>

        <nav id="menu">
            <ul>
               
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="carrinho.html">Carrinho</a></li>
            </ul>
        </nav>

    </header>

    <section id="login">

        <div class="caixa-login">

            <h1>Entrar</h1>

            <form action="#">

                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail" required>

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" required>

                <button type="submit">
                    Entrar
                </button>

                <p>
                    Não possui uma conta?
                    <a href="cadastro.html">Cadastre-se</a>
                </p>

            </form>

        </div>

    </section>

    <footer id="rodape">

        <h2>&copy; 2026 RP LOCAÇÕES</h2>

        <h3>Temos a solução para o seu evento!</h3>

        <p>Formas de pagamento: Pix, Cartão de Débito e Crédito.</p>

    </footer>

</main>

</body>
</html>
