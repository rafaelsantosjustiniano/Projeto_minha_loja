<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - RP Locações</title>

    <link rel="stylesheet" href="../css/style_carrinho.css">
</head>
<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">
            RP LOCAÇÕES
        </div>

        <nav id="menu">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="login.html">Login</a></li>
                <li>
                    <a href="carrinho.html">
                        <img src="../imagens/carrinho-de-compras-removebg-preview.png" alt="Carrinho">
                    </a>
                </li>
            </ul>
        </nav>

    </header>

    <section id="carrinho">

        <h1>Meu Carrinho</h1>

        <table>

            <tr>
                <th>Imagem</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
                <th>Subtotal</th>
            </tr>

            <tr>
                <td><img src="../imagens/cadeira-tiffany.jpg" alt=""></td>
                <td>Cadeira Tiffany</td>
                <td><input type="number" value="20"></td>
                <td>R$ 5,00</td>
                <td>R$ 100,00</td>
            </tr>

            <tr>
                <td><img src="../imagens/mesa-de-plastico.jpg" alt=""></td>
                <td>Mesa Plástica</td>
                <td><input type="number" value="10"></td>
                <td>R$ 5,00</td>
                <td>R$ 50,00</td>
            </tr>

            <tr>
                <td><img src="../imagens/caixa-termica.webp" alt=""></td>
                <td>Caixa Térmica</td>
                <td><input type="number" value="2"></td>
                <td>R$ 80,00</td>
                <td>R$ 160,00</td>
            </tr>

        </table>

        <div id="total">

            <h2>Total: R$ 310,00</h2>

            <button>Finalizar Compra</button>

        </div>

    </section>

    <footer id="rodape">

        <h2>&copy;2026 RP Locações</h2>
        <p>Temos a solução para seu evento.</p>

    </footer>

</main>

</body>
</html>
